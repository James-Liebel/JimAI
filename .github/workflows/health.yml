name: Health Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npx tsc --noEmit
        working-directory: frontend
      - run: npm run build
        working-directory: frontend

  vscode-ext:
    name: VS Code Extension Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: vscode-ext/package-lock.json
      - run: npm ci
        working-directory: vscode-ext
      - run: npm run build
        working-directory: vscode-ext

  chrome-ext:
    name: Chrome Extension Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: extension/package-lock.json
      - run: npm ci
        working-directory: extension
      - run: npm run build
        working-directory: extension

  backend:
    name: Backend Import Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
        working-directory: backend
      - name: Verify Python imports
        working-directory: backend
        run: |
          python -c "
          from config.settings import OLLAMA_BASE_URL
          from config.models import MODEL_ROUTES
          from config.ds_context import DATA_SCIENCE_CONTEXT
          from models.router import classify_message, RoutingDecision
          from models.prompts import build_rag_prompt
          from tools.math_tool import solve_equation
          from tools.python_exec import execute
          from tools.data_tools import profile_dataframe
          print('All imports successful')
          "
